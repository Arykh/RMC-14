- type: entity
  parent: CMBaseStructureCorrodible
  id: RMCCryoCell
  name: cryo cell
  description: A donation from the old A.W. project, using cryogenic technology. It slowly heals whoever is inside the tube.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14\Structures\Machines\Medical\cryo_cell.rsi
    drawdepth: Mobs
    noRot: true
    layers:
    - state: cell-off-empty
      map: ["enum.CryoCellVisualLayers.Base"]
  - type: InteractionOutline
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        density: 200
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: CryoCell
  - type: UserInterface
    interfaces:
      enum.CryoCellUIKey.Key:
        type: CryoCellBui
  - type: ActivatableUI
    key: enum.CryoCellUIKey.Key
  - type: ActivatableUIRequiresPower
  - type: ApcPowerReceiver
    powerLoad: 250
    needsPower: true
  - type: RMCPowerReceiver
    idleLoad: 20
    activeLoad: 200
    channel: Equipment
  - type: DragInsertContainer
    containerId: cryo_cell
    entryDelay: 2
    delaySelfEntry: true
  - type: NoStunOnExit # Stun/Unconscious from cold
  - type: ContainerContainer
    containers:
      cryo_cell: !type:ContainerSlot {}
      cryo_cell_beaker: !type:ContainerSlot {}
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CryoCellVisuals.State:
        enum.CryoCellVisualLayers.Base:
          OffEmpty: { state: cell-off-empty }
          OffOccupied: { state: cell-off-occupied }
          OnEmpty: { state: cell-on-empty }
          OnOccupied: { state: cell-on-occupied }
  - type: InsertBlacklist
    blacklist:
      components:
      - Xeno
  - type: RMCMesonsNonviewable
